<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rasto de Preços</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#2B2B28" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Preços" />
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F2EFE6; --surface: rgba(255,255,255,0.6); --surface-solid: #fff;
    --text: #2B2B28; --muted: #6B6A62; --border: #C9C6B8; --border-soft: #DEDBCD; --border-faint: #EEEBDE;
    --accent-dark: #2B2B28; --green: #2F6B4F; --red: #B4483C; --yellow-bg: #FBF3D6; --yellow-border: #E3C24E;
    --yellow-text: #8A5A0B; --purple: #7F77DD; --orange: #D85A30;
  }
  [data-theme="dark"] {
    --bg: #1C1C1A; --surface: rgba(255,255,255,0.06); --surface-solid: #2A2A27;
    --text: #EDEAE0; --muted: #9B998D; --border: #45443C; --border-soft: #3A3933; --border-faint: #333229;
    --accent-dark: #EDEAE0; --yellow-bg: rgba(244,211,94,0.12); --yellow-border: #6b5a26; --yellow-text: #E3C24E;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; transition: background .2s, color .2s; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .logo { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-dark); color: var(--bg);
          display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  h1 { font-size: 17px; font-weight: 600; margin: 0; line-height: 1.2; }
  .sub { font-size: 12px; color: var(--muted); margin: 0; }
  nav { display: flex; gap: 4px; border-bottom: 2px dashed var(--border); padding-bottom: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  nav button { border: none; background: none; padding: 6px 12px; font-size: 13px; border-radius: 6px 6px 0 0; color: var(--muted); cursor: pointer; }
  nav button.active { background: var(--accent-dark); color: var(--bg); font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .muted { color: var(--muted); font-size: 13px; }
  input, select, textarea, button.btn {
    font-family: inherit; font-size: 13px; padding: 7px 9px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface-solid); color: var(--text);
  }
  textarea { width: 100%; min-height: 90px; font-family: ui-monospace, monospace; font-size: 12px; }
  button.btn { cursor: pointer; }
  .btn-dark { background: var(--accent-dark); color: var(--bg); border: none; font-weight: 500; }
  .btn-green { background: var(--green); color: #fff; border: none; font-weight: 500; }
  .btn-ghost { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .row { display: flex; gap: 10px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 11px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; color: var(--muted); font-weight: 400; border-bottom: 1px solid var(--border-soft); padding: 4px 0; }
  td { padding: 4px 0; border-bottom: 1px solid var(--border-faint); font-family: ui-monospace, monospace; }
  td.txt { font-family: inherit; }
  .item-row { border: 1px solid var(--border-soft); background: var(--surface-solid); border-radius: 6px; padding: 8px; margin-bottom: 8px; }
  .item-row.duvida { border-color: var(--yellow-border); background: var(--yellow-bg); }
  .item-row .top { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-end; }
  .item-row .top input { width: 100%; box-sizing: border-box; }
  .minifield { display: flex; flex-direction: column; gap: 2px; }
  .minifield label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.02em; }
  .item-row .meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-size: 12px; margin-top: 6px; }
  .chip { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; border: 1px solid var(--border); background: var(--surface-solid); cursor: pointer; margin: 2px; color: var(--text); }
  .chip.active { background: var(--accent-dark); color: var(--bg); border-color: var(--accent-dark); }
  .stat { background: var(--surface); border-radius: 10px; padding: 10px; }
  .stat .label { font-size: 11px; color: var(--muted); }
  .stat .value { font-size: 20px; font-weight: 500; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .warn-box { background: var(--yellow-bg); border: 1px solid var(--yellow-border); color: var(--yellow-text); padding: 8px 10px; border-radius: 6px; font-size: 13px; }
  .auth-box { max-width: 320px; margin: 60px auto; display: flex; flex-direction: column; gap: 10px; }
  a.linklike { color: var(--text); text-decoration: underline; cursor: pointer; }
  .chart-wrap { position: relative; width: 100%; height: 220px; margin: 10px 0; }
  .rank-list { list-style: none; padding: 0; margin: 6px 0; font-size: 13px; }
  .rank-list li { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border-faint); }
</style>
</head>
<body>
<div id="app" class="wrap"></div>

<script>
/* ====== CONFIGURA AQUI ====== */
const firebaseConfig = {
  apiKey: "AIzaSyCMi8WCk8g2INhfb5Swu-YgeFHLX9E96bE",
  authDomain: "rasto-precos.firebaseapp.com",
  projectId: "rasto-precos",
  storageBucket: "rasto-precos.firebasestorage.app",
  messagingSenderId: "700525431109",
  appId: "1:700525431109:web:2da72cdb59e2537b9b962c"
};
/* ============================ */

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const CATEGORIAS = ["Fruta e Legumes","Talho e Peixe","Laticínios e Ovos","Padaria","Mercearia",
  "Congelados","Bebidas","Limpeza","Higiene","Bebé","Outros"];
const PALETA = ["#2F6B4F","#B4483C","#7F77DD","#D85A30","#3B6FA6","#A0522D","#4B8B8B","#8A5A0B","#6B6A62","#B48CC9"];

let state = {
  user: null,
  authMode: "login",
  authError: null,
  tab: "nova",
  theme: localStorage.getItem("theme") || "light",
  invoices: [],
  products: [],
  listaCompras: [],
  draft: null,
  editingInvoiceId: null,
  draftQueue: [],
  pasteText: "",
  flashMessage: null,
  faturaQuery: "",
  categoriaSelecionada: null,
  produtoFiltroCategoria: "all",
  produtoSelecionado: null,
  produtoQuery: "",
  produtoRenameDraft: null,
  produtoMergeAlvo: "",
  produtoTagFiltro: null,
  periodoFiltro: "tudo",
  modoSupermercado: false,
  novoItemListaNome: "",
  novoItemListaCategoria: "Mercearia"
};
document.documentElement.setAttribute("data-theme", state.theme);

let charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function todayISO() { return new Date().toISOString().slice(0, 10); }
function getLastInvoiceLoja() {
  if (!state.invoices.length) return "";
  const sorted = [...state.invoices].sort((a, b) => (a.criadoEm < b.criadoEm ? 1 : -1));
  return sorted[0].loja || "";
}

function getPeriodStart() {
  const p = state.periodoFiltro;
  const now = new Date();
  if (p === "3m") { const d = new Date(now); d.setMonth(d.getMonth() - 3); return d; }
  if (p === "6m") { const d = new Date(now); d.setMonth(d.getMonth() - 6); return d; }
  if (p === "ano") { return new Date(now.getFullYear(), 0, 1); }
  return null;
}
function getFilteredInvoices() {
  const start = getPeriodStart();
  if (!start) return state.invoices;
  return state.invoices.filter((inv) => inv.data && new Date(inv.data + "T00:00:00") >= start);
}
function renderPeriodoFiltro() {
  return `
    <div class="meta" style="margin-bottom:10px">
      <span class="muted">período:</span>
      <select onchange="state.periodoFiltro=this.value; render();">
        <option value="tudo" ${state.periodoFiltro === "tudo" ? "selected" : ""}>tudo</option>
        <option value="3m" ${state.periodoFiltro === "3m" ? "selected" : ""}>últimos 3 meses</option>
        <option value="6m" ${state.periodoFiltro === "6m" ? "selected" : ""}>últimos 6 meses</option>
        <option value="ano" ${state.periodoFiltro === "ano" ? "selected" : ""}>este ano</option>
      </select>
    </div>
  `;
}

function reRenderKeepFocus() {
  const active = document.activeElement;
  const id = active && active.id;
  const selStart = active && active.selectionStart;
  const selEnd = active && active.selectionEnd;
  render();
  if (id) {
    const el = document.getElementById(id);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
}

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function normalize(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toLowerCase().replace(/\s+/g, " ").trim();
}
function money(n) {
  const v = Number(n);
  if (!isFinite(v)) return "--";
  return v.toLocaleString("pt-PT", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function findMatchingProduct(name, products) {
  const n = normalize(name);
  if (!n) return null;
  for (const p of products) {
    if (normalize(p.name) === n) return p.id;
    if ((p.aliases || []).some((a) => normalize(a) === n)) return p.id;
  }
  let best = null;
  for (const p of products) {
    const pn = normalize(p.name);
    if (pn.length > 3 && (n.includes(pn) || pn.includes(n))) best = p.id;
  }
  return best;
}
function esc(s) {
  return (s ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* -- preço normalizado: converte g->kg e ml->l para poder comparar entre compras
      registadas em unidades diferentes do mesmo tipo de artigo -- */
function normalizedPrice(it) {
  const u = (it.unidade || "").toLowerCase();
  if (u === "g" || u === "ml") return (Number(it.preco_unitario) || 0) * 1000;
  return Number(it.preco_unitario) || 0;
}
function normalizedUnitLabel(unidade) {
  const u = (unidade || "").toLowerCase();
  if (u === "kg" || u === "g") return "€/kg";
  if (u === "l" || u === "ml") return "€/l";
  return "€/un";
}

function toggleTheme() {
  state.theme = state.theme === "light" ? "dark" : "light";
  localStorage.setItem("theme", state.theme);
  document.documentElement.setAttribute("data-theme", state.theme);
  render();
}

/* ---------- AUTH ---------- */

auth.onAuthStateChanged((user) => {
  state.user = user;
  if (user) attachListeners(); else detachListeners();
  render();
});

function attachListeners() {
  const uidStr = state.user.uid;
  db.collection("users").doc(uidStr).collection("invoices").onSnapshot((snap) => {
    state.invoices = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("users").doc(uidStr).collection("products").onSnapshot((snap) => {
    state.products = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    render();
  });
  db.collection("users").doc(uidStr).collection("listaCompras").onSnapshot((snap) => {
    state.listaCompras = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    render();
  });
}
function detachListeners() { state.invoices = []; state.products = []; state.listaCompras = []; }

function doLogin() {
  const email = document.getElementById("auth-email").value.trim();
  const pass = document.getElementById("auth-pass").value;
  state.authError = null;
  const fn = state.authMode === "login"
    ? auth.signInWithEmailAndPassword(email, pass)
    : auth.createUserWithEmailAndPassword(email, pass);
  fn.catch((e) => { state.authError = e.message; render(); });
}
function toggleAuthMode() { state.authMode = state.authMode === "login" ? "signup" : "login"; render(); }
function doLogout() { auth.signOut(); }

/* ---------- SAVE INVOICE ---------- */

async function saveInvoice() {
  const d = state.draft;
  if (!d || !d.items.length) return;

  // aviso de possível fatura duplicada (ignora a própria fatura quando estamos a editar)
  const totalDraft = Number(d.items.reduce((s,i)=>s+(Number(i.preco_total)||0),0).toFixed(2));
  const possivelDuplicado = state.invoices.some((inv) =>
    inv.id !== state.editingInvoiceId &&
    normalize(inv.loja) === normalize(d.loja) && inv.data === d.data && Math.abs(inv.total - totalDraft) < 0.01
  );
  if (possivelDuplicado) {
    if (!confirm("Já existe uma fatura guardada com a mesma loja, data e total. Guardar mesmo assim?")) return;
  }

  // aviso se a soma dos artigos não bater certo com o total do talão (se preenchido)
  if (d.totalConferencia !== undefined && d.totalConferencia !== "" && d.totalConferencia !== null) {
    const totalConf = Number(d.totalConferencia);
    if (isFinite(totalConf) && Math.abs(totalConf - totalDraft) > 0.02) {
      if (!confirm(`A soma dos artigos (${money(totalDraft)} €) não bate certo com o total do talão que puseste (${money(totalConf)} €). Guardar mesmo assim?`)) return;
    }
  }

  const uidStr = state.user.uid;
  const batch = db.batch();
  const finalItems = [];
  for (const it of d.items) {
    let pid = it.productId;
    if (it.isNewProduct) {
      pid = pid || uid();
      const ref = db.collection("users").doc(uidStr).collection("products").doc(pid);
      batch.set(ref, {
        name: it.nome, aliases: [it.nome], category: it.categoria || "Outros"
      }, { merge: true });
    } else if (pid) {
      const prod = state.products.find((p) => p.id === pid);
      if (prod && !(prod.aliases || []).some((a) => normalize(a) === normalize(it.nome))) {
        const ref = db.collection("users").doc(uidStr).collection("products").doc(pid);
        batch.update(ref, { aliases: firebase.firestore.FieldValue.arrayUnion(it.nome) });
      }
    }
    finalItems.push({
      productId: pid, nome: it.nome,
      quantidade: Number(it.quantidade) || 1, unidade: it.unidade,
      preco_unitario: Number(it.preco_unitario) || 0, preco_total: Number(it.preco_total) || 0
    });
  }
  const total = finalItems.reduce((s, i) => s + (i.preco_total || 0), 0);
  const invData = {
    loja: d.loja || "Loja", data: d.data || new Date().toISOString().slice(0, 10),
    itens: finalItems, total, notas: d.notas || "", pago_com: d.pago_com || "Nosso"
  };
  if (state.editingInvoiceId) {
    const invRef = db.collection("users").doc(uidStr).collection("invoices").doc(state.editingInvoiceId);
    batch.set(invRef, invData, { merge: true });
  } else {
    const invRef = db.collection("users").doc(uidStr).collection("invoices").doc();
    batch.set(invRef, { ...invData, criadoEm: new Date().toISOString() });
  }
  await batch.commit();

  const aEditar = !!state.editingInvoiceId;
  state.editingInvoiceId = null;
  state.pasteText = "";

  if (!aEditar && state.draftQueue.length) {
    state.draft = buildDraftFromParsed(state.draftQueue.shift());
  } else {
    state.draft = null;
  }

  state.flashMessage = "✓ fatura guardada";
  render();
  setTimeout(() => { state.flashMessage = null; render(); }, 1600);
}

function editInvoice(id) {
  const inv = state.invoices.find((i) => i.id === id);
  if (!inv) return;
  state.editingInvoiceId = id;
  state.draft = {
    loja: inv.loja, data: inv.data, notas: inv.notas || "", pago_com: inv.pago_com || "Nosso",
    items: inv.itens.map((it) => ({
      key: uid(), nome: it.nome, quantidade: it.quantidade, unidade: it.unidade,
      preco_unitario: it.preco_unitario, preco_total: it.preco_total,
      duvida: false, nota: "", productId: it.productId, isNewProduct: false, categoria: "Outros"
    }))
  };
  state.tab = "nova";
  render();
}

function deleteInvoice(id) {
  if (!confirm("Apagar esta fatura?")) return;
  db.collection("users").doc(state.user.uid).collection("invoices").doc(id).delete();
}

function updateProductCategory(pid, category) {
  db.collection("users").doc(state.user.uid).collection("products").doc(pid).update({ category });
}

function updateProductTags(pid, tagsString) {
  const tags = Array.from(new Set((tagsString || "").split(",").map((t) => t.trim()).filter(Boolean)));
  db.collection("users").doc(state.user.uid).collection("products").doc(pid).update({ tags });
}

function renameProduct(pid, newName) {
  const nome = (newName || "").trim();
  if (!nome) return;
  const prod = state.products.find((p) => p.id === pid);
  if (!prod) return;
  const aliases = Array.from(new Set([...(prod.aliases || []), prod.name, nome]));
  db.collection("users").doc(state.user.uid).collection("products").doc(pid).update({ name: nome, aliases });
}

async function mergeProducts(sourceId, targetId) {
  if (!targetId || sourceId === targetId) { alert("Escolhe um produto diferente para fundir."); return; }
  const source = state.products.find((p) => p.id === sourceId);
  const target = state.products.find((p) => p.id === targetId);
  if (!source || !target) return;
  if (!confirm(`Fundir "${source.name}" com "${target.name}"? O histórico de compras de "${source.name}" passa a contar para "${target.name}", e "${source.name}" é apagado.`)) return;

  const uidStr = state.user.uid;
  const batch = db.batch();
  for (const inv of state.invoices) {
    if (inv.itens.some((it) => it.productId === sourceId)) {
      const newItens = inv.itens.map((it) => it.productId === sourceId ? { ...it, productId: targetId } : it);
      batch.update(db.collection("users").doc(uidStr).collection("invoices").doc(inv.id), { itens: newItens });
    }
  }
  const mergedAliases = Array.from(new Set([...(target.aliases || []), ...(source.aliases || []), source.name]));
  batch.update(db.collection("users").doc(uidStr).collection("products").doc(targetId), { aliases: mergedAliases });
  batch.delete(db.collection("users").doc(uidStr).collection("products").doc(sourceId));
  await batch.commit();

  if (state.produtoSelecionado === sourceId) state.produtoSelecionado = targetId;
  state.produtoMergeAlvo = "";
  render();
}

/* ---------- DRAFT (nova fatura) ---------- */

function buildDraftFromParsed(parsed) {
  const items = (parsed.itens || []).map((it) => {
    const productId = findMatchingProduct(it.nome, state.products);
    return {
      key: uid(), nome: it.nome || "", quantidade: it.quantidade ?? 1,
      unidade: it.unidade || "un", preco_unitario: it.preco_unitario ?? 0,
      preco_total: it.preco_total ?? 0, duvida: !!it.duvida, nota: it.nota || "",
      productId, isNewProduct: !productId,
      categoria: CATEGORIAS.includes(it.categoria) ? it.categoria : "Outros"
    };
  });
  return {
    loja: parsed.loja || getLastInvoiceLoja(),
    data: parsed.data || todayISO(),
    notas: "", pago_com: "Nosso", items
  };
}

function parsePaste() {
  try {
    const raw = state.pasteText.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      if (!parsed.length) return;
      state.draftQueue = parsed.slice(1);
      state.draft = buildDraftFromParsed(parsed[0]);
    } else {
      state.draftQueue = [];
      state.draft = buildDraftFromParsed(parsed);
    }
  } catch (e) {
    alert("Não consegui ler esse texto como JSON. Confirma que colaste o bloco todo, tal como o Claude o escreveu. (Se forem várias faturas, cola-as dentro de um array [ ] separadas por vírgula.)");
  }
}

function newManualDraft() {
  state.draft = { loja: getLastInvoiceLoja(), data: todayISO(), notas: "", pago_com: "Nosso", items: [] };
  render();
}

function addManualItem() {
  state.draft.items.push({
    key: uid(), nome: "", quantidade: 1, unidade: "un", preco_unitario: 0, preco_total: 0,
    duvida: false, nota: "", productId: null, isNewProduct: true, categoria: "Outros"
  });
  render();
}
function removeDraftItem(key) {
  state.draft.items = state.draft.items.filter((it) => it.key !== key);
  render();
}
function updateDraftField(field, value) { state.draft[field] = value; }
function updateDraftItem(key, field, value) {
  const it = state.draft.items.find((i) => i.key === key);
  if (it) it[field] = value;
}
function setDraftItemProduct(key, value) {
  const it = state.draft.items.find((i) => i.key === key);
  if (!it) return;
  if (value === "__new__") { it.productId = null; it.isNewProduct = true; }
  else { it.productId = value; it.isNewProduct = false; }
  render();
}

/* ---------- HISTÓRICO / ANÁLISES ---------- */

function getProductHistory(productId, invoicesList) {
  const list = invoicesList || state.invoices;
  const rows = [];
  for (const inv of list) {
    for (const it of inv.itens) {
      if (it.productId === productId) {
        rows.push({ data: inv.data, loja: inv.loja, preco: normalizedPrice(it), unidade: it.unidade });
      }
    }
  }
  return rows.sort((a,b) => (a.data > b.data ? 1 : -1));
}

function getStoreComparison(productId) {
  const rows = getProductHistory(productId, getFilteredInvoices());
  const byStore = {};
  for (const r of rows) {
    if (!byStore[r.loja]) byStore[r.loja] = { total: 0, count: 0 };
    byStore[r.loja].total += r.preco; byStore[r.loja].count += 1;
  }
  return Object.entries(byStore)
    .map(([loja, v]) => ({ loja, media: v.total / v.count }))
    .sort((a, b) => a.media - b.media);
}

function yearComparisonFromHistory(hist) {
  const now = new Date();
  const thisYear = now.getFullYear(), lastYear = thisYear - 1;
  const byYear = {};
  for (const h of hist) {
    const y = Number((h.data || "").slice(0, 4));
    if (!y) continue;
    if (!byYear[y]) byYear[y] = { total: 0, count: 0 };
    byYear[y].total += h.preco; byYear[y].count += 1;
  }
  const a = byYear[thisYear], b = byYear[lastYear];
  if (!a || !b) return null;
  return { thisYear, lastYear, mediaThis: a.total / a.count, mediaLast: b.total / b.count };
}

function priceDeviationBadge(it) {
  if (!it.productId) return "";
  const hist = getProductHistory(it.productId);
  if (!hist.length) return "";
  const avg = hist.reduce((s, h) => s + h.preco, 0) / hist.length;
  if (!avg) return "";
  const cur = normalizedPrice(it);
  const diff = ((cur - avg) / avg) * 100;
  if (Math.abs(diff) < 15) return "";
  const color = diff > 0 ? "var(--red)" : "var(--green)";
  return `<div style="color:${color}; font-size:11px; margin-top:4px;">${diff > 0 ? "▲" : "▼"} ${Math.abs(diff).toFixed(0)}% vs média histórica (${money(avg)} ${normalizedUnitLabel(it.unidade)})</div>`;
}

function computeFrequency(productId) {
  const hist = getProductHistory(productId);
  if (hist.length < 2) return null;
  const dates = hist.map((h) => new Date(h.data + "T00:00:00")).filter((d) => !isNaN(d));
  dates.sort((a, b) => a - b);
  let totalDays = 0, count = 0;
  for (let i = 1; i < dates.length; i++) {
    const diff = (dates[i] - dates[i - 1]) / (1000 * 60 * 60 * 24);
    if (diff > 0) { totalDays += diff; count++; }
  }
  if (!count) return null;
  const avgInterval = totalDays / count;
  const last = dates[dates.length - 1];
  const daysSince = (new Date() - last) / (1000 * 60 * 60 * 24);
  return {
    avgInterval, daysSince,
    lastDate: hist[hist.length - 1].data,
    overdueRatio: avgInterval > 0 ? daysSince / avgInterval : 0,
    amostras: dates.length
  };
}

function computeShoppingList() {
  const results = [];
  for (const p of state.products) {
    const freq = computeFrequency(p.id);
    if (freq && freq.overdueRatio >= 1 && freq.overdueRatio < 3) {
      results.push({ nome: p.name, categoria: p.category || "Outros", ...freq });
    }
  }
  return results.sort((a, b) => b.overdueRatio - a.overdueRatio);
}

function computeForgottenProducts() {
  const results = [];
  for (const p of state.products) {
    const freq = computeFrequency(p.id);
    if (freq && freq.overdueRatio >= 3) {
      results.push({ nome: p.name, categoria: p.category || "Outros", ...freq });
    }
  }
  return results.sort((a, b) => b.daysSince - a.daysSince);
}

function computeRanking() {
  const results = [];
  const filtered = getFilteredInvoices();
  for (const p of state.products) {
    const hist = getProductHistory(p.id, filtered);
    if (hist.length < 2) continue;
    const first = hist[0].preco, last = hist[hist.length - 1].preco;
    if (!first) continue;
    const change = ((last - first) / first) * 100;
    results.push({ nome: p.name, change });
  }
  const subiram = [...results].sort((a, b) => b.change - a.change).slice(0, 5);
  const desceram = [...results].sort((a, b) => a.change - b.change).slice(0, 5);
  return { subiram, desceram };
}

function exportExcel() {
  const rows = [];
  for (const inv of state.invoices) {
    for (const it of inv.itens) {
      const prod = state.products.find((p) => p.id === it.productId);
      rows.push({
        data: inv.data, loja: inv.loja, artigo: it.nome, categoria: prod?.category || "",
        quantidade: it.quantidade, unidade: it.unidade,
        preco_unitario: it.preco_unitario, preco_total: it.preco_total, notas_fatura: inv.notas || ""
      });
    }
  }
  const wsInvoices = XLSX.utils.json_to_sheet(rows);
  const wsProducts = XLSX.utils.json_to_sheet(state.products.map((p) => ({
    nome: p.name, categoria: p.category || "Outros", aliases: (p.aliases || []).join(", ")
  })));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsInvoices, "Faturas");
  XLSX.utils.book_append_sheet(wb, wsProducts, "Produtos");
  XLSX.writeFile(wb, "rasto-precos-" + new Date().toISOString().slice(0, 10) + ".xlsx");
}

function drawCategoryCharts() {
  const cat = state.categoriaSelecionada;
  const prodsInCat = state.products.filter((p) => (p.category||"Outros") === cat);
  const idsInCat = new Set(prodsInCat.map((p) => p.id));
  const filtro = state.produtoFiltroCategoria;
  const invsFiltradas = getFilteredInvoices();

  const buckets = {};
  for (const inv of invsFiltradas) {
    for (const it of inv.itens) {
      if (!idsInCat.has(it.productId)) continue;
      if (filtro !== "all" && it.productId !== filtro) continue;
      const key = inv.data?.slice(0,7);
      if (!key) continue;
      buckets[key] = (buckets[key]||0) + it.preco_total;
    }
  }
  const labels = Object.keys(buckets).sort();
  destroyChart("categoria");
  const ctx = document.getElementById("chart-categoria");
  if (ctx && labels.length) {
    charts.categoria = new Chart(ctx, {
      type: "bar",
      data: { labels, datasets: [{ label: "gasto", data: labels.map((k)=>Number(buckets[k].toFixed(2))), backgroundColor: "#D85A30" }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  destroyChart("categoriaLinhas");
  const ctxLinhas = document.getElementById("chart-categoria-linhas");
  if (ctxLinhas && filtro === "all" && prodsInCat.length > 1) {
    const allDates = new Set();
    const perProduct = {};
    for (const p of prodsInCat) {
      const hist = getProductHistory(p.id, invsFiltradas);
      if (!hist.length) continue;
      perProduct[p.id] = hist;
      hist.forEach((h) => allDates.add(h.data));
    }
    const sortedDates = [...allDates].sort();
    const datasets = Object.entries(perProduct).map(([pid, hist], i) => {
      const byDate = {};
      hist.forEach((h) => { byDate[h.data] = h.preco; });
      const prod = prodsInCat.find((p) => p.id === pid);
      return {
        label: prod?.name || "?",
        data: sortedDates.map((d) => (byDate[d] !== undefined ? byDate[d] : null)),
        borderColor: PALETA[i % PALETA.length],
        backgroundColor: PALETA[i % PALETA.length],
        spanGaps: true, tension: 0.2
      };
    });
    if (sortedDates.length && datasets.length) {
      charts.categoriaLinhas = new Chart(ctxLinhas, {
        type: "line",
        data: { labels: sortedDates, datasets },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, labels: { boxWidth: 10, font: { size: 10 } } } } }
      });
    }
  }
}

function addSuggestedToList(nome, categoria) {

  db.collection("users").doc(state.user.uid).collection("listaCompras").add({

async function clearListaComprados() {
  const comprados = state.listaCompras.filter((it) => it.comprado);

  await batch.commit();

function computeHabitStats() {
  const invs = getFilteredInvoices();
  if (!invs.length) return null;
  const totalItens = invs.reduce((s, inv) => s + inv.itens.length, 0);
  const mediaItens = totalItens / invs.length;
  const mediaGasto = invs.reduce((s, inv) => s + inv.total, 0) / invs.length;
  const datas = [...new Set(invs.map((inv) => inv.data))].filter(Boolean).sort();
  let mediaDias = null;
  if (datas.length >= 2) {
    let total = 0, count = 0;
    for (let i = 1; i < datas.length; i++) {
      const diff = (new Date(datas[i] + "T00:00:00") - new Date(datas[i - 1] + "T00:00:00")) / (1000 * 60 * 60 * 24);
      if (diff > 0) { total += diff; count++; }
    }
    if (count) mediaDias = total / count;
  }
  return { mediaItens, mediaGasto, mediaDias };
}

function computeStoreOverview() {
  const byStore = {};
  for (const inv of getFilteredInvoices()) {
    const loja = inv.loja || "Loja";
    if (!byStore[loja]) byStore[loja] = { total: 0, count: 0 };
    byStore[loja].total += inv.total;
    byStore[loja].count += 1;
  }
  return Object.entries(byStore)
    .map(([loja, v]) => ({ loja, total: v.total, count: v.count, ticket: v.total / v.count }))
    .sort((a, b) => b.total - a.total);
}

function computeMonthlyBuckets() {
  const buckets = {};
  for (const inv of getFilteredInvoices()) {
    const key = inv.data?.slice(0, 7);
    if (!key) continue;
    buckets[key] = (buckets[key] || 0) + inv.total;
  }
  return buckets;
}

function computeMonthOverMonth() {
  const buckets = computeMonthlyBuckets();
  const keys = Object.keys(buckets).sort();
  if (keys.length < 2) return null;
  const atual = keys[keys.length - 1], anterior = keys[keys.length - 2];
  const valorAtual = buckets[atual], valorAnterior = buckets[anterior];
  if (!valorAnterior) return null;
  const pct = ((valorAtual - valorAnterior) / valorAnterior) * 100;
  return { atual, anterior, pct };
}

function computeCabazHabitual(topN = 8) {
  const filtered = getFilteredInvoices();
  const counts = state.products.map((p) => ({ p, hist: getProductHistory(p.id, filtered) }))
    .filter((x) => x.hist.length >= 2)
    .sort((a, b) => b.hist.length - a.hist.length)
    .slice(0, topN);
  if (!counts.length) return [];
  const byMonth = {};
  for (const { hist } of counts) {
    for (const h of hist) {
      const key = h.data?.slice(0, 7);
      if (!key) continue;
      if (!byMonth[key]) byMonth[key] = { total: 0, count: 0 };
      byMonth[key].total += h.preco;
      byMonth[key].count += 1;
    }
  }
  return Object.keys(byMonth).sort().map((key) => ({
    mes: key, media: Number((byMonth[key].total / byMonth[key].count).toFixed(2))
  }));
}

    </div>` : ""}
    <div class="card">
      <p style="font-weight:500; margin-top:0">comparativo por loja</p>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-lojas"></canvas></div>
      <table>
        <thead><tr><th>loja</th><th style="text-align:right">nº faturas</th><th style="text-align:right">ticket médio</th><th style="text-align:right">total gasto</th></tr></thead>
        <tbody>
          ${lojas.map((l) => `<tr><td class="txt">${esc(l.loja)}</td><td style="text-align:right">${l.count}</td>
            <td style="text-align:right">${money(l.ticket)} €</td><td style="text-align:right">${money(l.total)} €</td></tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div class="card">
      <p style="font-weight:500; margin-top:0">gasto por categoria</p>
      <div class="chart-wrap"><canvas id="chart-categoria-pie"></canvas></div>
    </div>
    ${subiram.length ? `
    <div class="card">
      <p style="font-weight:500; margin-top:0">o que mais subiu de preço</p>
      <ul class="rank-list">
        ${subiram.map((r) => `<li><span>${esc(r.nome)}</span><span style="color:var(--red)">+${r.change.toFixed(1)}%</span></li>`).join("")}
      </ul>
      <p style="font-weight:500; margin:14px 0 0">o que mais desceu de preço</p>
      <ul class="rank-list">
        ${desceram.map((r) => `<li><span>${esc(r.nome)}</span><span style="color:var(--green)">${r.change.toFixed(1)}%</span></li>`).join("")}
      </ul>
    </div>` : ""}
    `}
  `;
}
function drawCabazChart() {
  const cabaz = computeCabazHabitual();
  destroyChart("cabaz");
  const ctx = document.getElementById("chart-cabaz");
  if (ctx && cabaz.length > 1) {
    charts.cabaz = new Chart(ctx, {
      type: "line",
      data: { labels: cabaz.map((c) => c.mes), datasets: [{ label: "preço médio", data: cabaz.map((c) => c.media),
        borderColor: "#8A5A0B", backgroundColor: "#8A5A0B", tension: 0.2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}
function drawLojasChart() {
  const lojas = computeStoreOverview();
  destroyChart("lojas");
  const ctx = document.getElementById("chart-lojas");
  if (ctx && lojas.length) {
    charts.lojas = new Chart(ctx, {
      type: "bar",
      data: { labels: lojas.map((l) => l.loja), datasets: [{ label: "total gasto", data: lojas.map((l) => Number(l.total.toFixed(2))), backgroundColor: "#3B6FA6" }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}
function drawResumoChart() {
  const buckets = {};
  for (const inv of state.invoices) {
    const key = inv.data?.slice(0,7);
    if (!key) continue;
    buckets[key] = (buckets[key]||0) + inv.total;
  }
  const labels = Object.keys(buckets).sort();
  destroyChart("resumo");
  const ctx = document.getElementById("chart-resumo");
  if (ctx && labels.length) {
    charts.resumo = new Chart(ctx, {
      type: "bar",
      data: { labels, datasets: [{ label: "gasto", data: labels.map((k)=>Number(buckets[k].toFixed(2))), backgroundColor: "#D85A30" }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }
}
function drawCategoriaPieChart() {
  const buckets = {};
  for (const inv of state.invoices) {
    for (const it of inv.itens) {
      const prod = state.products.find((p) => p.id === it.productId);
      const cat = prod?.category || "Outros";
      buckets[cat] = (buckets[cat] || 0) + it.preco_total;
    }
  }
  const labels = Object.keys(buckets);
  destroyChart("categoriaPie");
  const ctx = document.getElementById("chart-categoria-pie");
  if (ctx && labels.length) {
    charts.categoriaPie = new Chart(ctx, {
      type: "doughnut",
      data: { labels, datasets: [{ data: labels.map((k)=>Number(buckets[k].toFixed(2))), backgroundColor: PALETA }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 10 } } } } }
    });
  }
}

render();
</script>
</body>
</html>
